# Serve a SPA React: qualquer rota desconhecida cai no index.html
# para o React Router assumir o roteamento no client-side.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
